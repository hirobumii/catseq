name: CI

on:
  push:
    branches:
      - main
      - "dev/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHON_VERSION: "3.12"
  RUST_TOOLCHAIN: "1.88.0"
  UV_VERSION: "0.11.8"

jobs:
  platform:
    name: ${{ matrix.name }} checks and native build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            artifact: catseqc-linux-x86_64
            target: x86_64-unknown-linux-gnu
          - name: Windows x86_64
            os: windows-2025
            artifact: catseqc-windows-x86_64
            target: x86_64-pc-windows-msvc

    steps:
      - name: Check out CatSeq
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Configure private Git credentials
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          if [[ -z "$GITEA_USERNAME" || -z "$GITEA_TOKEN" ]]; then
            echo "::error::Gitea credentials are not configured"
            exit 1
          fi
          umask 077
          printf 'machine git.opticaltweezer.eu.org\nlogin %s\npassword %s\n' \
            "$GITEA_USERNAME" "$GITEA_TOKEN" > "$HOME/.netrc"

      - name: Configure private Git credentials
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          if (-not $env:GITEA_USERNAME -or -not $env:GITEA_TOKEN) {
            Write-Error "Gitea credentials are not configured"
          }
          $netrc = Join-Path $HOME "_netrc"
          @"
          machine git.opticaltweezer.eu.org
          login $env:GITEA_USERNAME
          password $env:GITEA_TOKEN
          "@ | Set-Content -Path $netrc
          "NETRC=$netrc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sync the fixed Python environment
        run: uv sync --locked --all-extras --dev

      - name: Check Python code
        run: uv run ruff check catseq tests

      - name: Run Python tests
        run: uv run pytest -q

      - name: Install the pinned Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} \
            --profile minimal \
            --component rustfmt \
            --component clippy \
            --no-self-update
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Check Rust formatting
        if: runner.os == 'Linux'
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Lint the Rust workspace
        if: runner.os == 'Linux'
        working-directory: rust
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test the Rust workspace
        working-directory: rust
        run: cargo test --locked --workspace --all-targets

      - name: Build catseqc in release mode
        working-directory: rust
        run: cargo build --locked --release --bin catseqc

      - name: Build the Windows wheel
        if: runner.os == 'Windows'
        run: uv build --wheel

      - name: Install the Windows wheel into a clean environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $venv = Join-Path $env:RUNNER_TEMP "catseq-wheel-test"
          uv venv --python $env:PYTHON_VERSION $venv
          $python = Join-Path $venv "Scripts/python.exe"
          $compiler = Join-Path $venv "Scripts/catseqc.exe"
          $wheel = (Get-ChildItem "dist/*.whl").FullName
          uv pip install --python $python $wheel
          & $python -c 'from importlib.metadata import version; import catseq; from catseq.targets import rtmq_v2_profile; assert catseq.__version__ == version("catseq"); assert rtmq_v2_profile()["rtmq_abi_version"] == 2'
          & $compiler --version

      - name: Package the Linux compiler
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p "dist/catseqc-${{ matrix.target }}"
          cp rust/target/release/catseqc "dist/catseqc-${{ matrix.target }}/"
          tar -C dist -czf "dist/catseqc-${{ matrix.target }}.tar.gz" \
            "catseqc-${{ matrix.target }}"

      - name: Package the Windows compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "dist/catseqc-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          Copy-Item "rust/target/release/catseqc.exe" "$package/catseqc.exe"
          Compress-Archive -Path $package -DestinationPath "$package.zip"

      - name: Upload the platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.whl
          if-no-files-found: error

  python-package:
    name: Build and install the Python package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out CatSeq
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Configure private Git credentials
        shell: bash
        env:
          GITEA_USERNAME: ${{ secrets.GITEA_USERNAME }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          if [[ -z "$GITEA_USERNAME" || -z "$GITEA_TOKEN" ]]; then
            echo "::error::Gitea credentials are not configured"
            exit 1
          fi
          umask 077
          printf 'machine git.opticaltweezer.eu.org\nlogin %s\npassword %s\n' \
            "$GITEA_USERNAME" "$GITEA_TOKEN" > "$HOME/.netrc"

      - name: Install the pinned Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --no-self-update
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Build wheel and source distribution
        run: uv build

      - name: Install the wheel into a clean environment
        shell: bash
        run: |
          uv venv --python "$PYTHON_VERSION" "$RUNNER_TEMP/catseq-wheel-test"
          uv pip install \
            --python "$RUNNER_TEMP/catseq-wheel-test/bin/python" \
            dist/*.whl
          "$RUNNER_TEMP/catseq-wheel-test/bin/python" - <<'PY'
          from importlib.metadata import version

          import catseq
          from catseq.targets import rtmq_v2_profile

          assert catseq.__version__ == version("catseq")
          assert rtmq_v2_profile()["rtmq_abi_version"] == 2
          PY
          "$RUNNER_TEMP/catseq-wheel-test/bin/catseqc" --version

      - name: Upload the Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: catseq-python
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish tag artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - platform
      - python-package
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out CatSeq
        uses: actions/checkout@v4

      - name: Verify release versions
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import tomllib

          root = pathlib.Path.cwd()
          python_version = tomllib.loads(
              (root / "pyproject.toml").read_text()
          )["project"]["version"]
          rust_version = tomllib.loads(
              (root / "rust/Cargo.toml").read_text()
          )["workspace"]["package"]["version"]
          rust_version = rust_version.replace("-dev.", ".dev")
          tag = "${{ github.ref_name }}"
          expected = f"v{python_version}"
          if tag != expected or rust_version != python_version:
              raise SystemExit(
                  f"release version mismatch: tag={tag}, "
                  f"python={python_version}, rust={rust_version}"
              )
          changelog = (root / "CHANGELOG.md").read_text()
          if f"## [{python_version}]" not in changelog:
              raise SystemExit(
                  f"CHANGELOG.md has no [{python_version}] release section"
              )
          PY

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: catseq*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Create the GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          release-assets/*
          --verify-tag
          --generate-notes
